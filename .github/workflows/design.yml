name: Design

on:
  workflow_dispatch:
    inputs:
      brief:
        description: 'Brief en español, ej: "post para Puerto Fuy mood golden hour, abrimos reservas verano"'
        required: true
        type: string
      format:
        description: 'Formato (auto = Claude decide segun el brief)'
        required: false
        type: choice
        default: auto
        options:
          - auto
          - post
          - story
          - carrusel
      count:
        description: 'Cantidad de piezas a generar (1-5). Si > 1, se activa el batch planner que genera N piezas con temáticas distintas.'
        required: false
        type: choice
        default: '1'
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
      upload_to_drive:
        description: 'Subir el PNG a la carpeta Drive de outputs'
        required: false
        type: boolean
        default: true

jobs:
  design:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci || npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate design
        env:
          BRIEF: ${{ inputs.brief }}
          FORMAT: ${{ inputs.format }}
          COUNT: ${{ inputs.count }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          OUTPUT_DRIVE_FOLDER_ID: ${{ inputs.upload_to_drive && secrets.OUTPUT_DRIVE_FOLDER_ID || '' }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: npm run design

      - name: Upload PNG artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rutacamp-design
          path: |
            out/*.png
            out/*.caption.txt
          if-no-files-found: warn
          retention-days: 30
