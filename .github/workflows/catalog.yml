name: Catalog photos

on:
  schedule:
    # 1st day of each month at 09:00 UTC (~06:00 Chile)
    - cron: '0 9 1 * *'
  workflow_dispatch:
    inputs:
      destino:
        description: 'Destino especifico (puerto-fuy, conguillio, tagua-tagua, red, aereas) o vacio para todos'
        required: false
        type: string
        default: ''
      full:
        description: 'Re-taggear todo desde cero (ignorar cache)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # necesario para hacer commit del catálogo actualizado

jobs:
  catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci || npm install

      - name: Run catalog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.destino }}" ]; then ARGS="$ARGS --destino ${{ inputs.destino }}"; fi
          if [ "${{ inputs.full }}" = "true" ]; then ARGS="$ARGS --full"; fi
          node scripts/catalog.mjs $ARGS

      - name: Commit catalog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog/
          if git diff --cached --quiet; then
            echo "No catalog changes to commit"
          else
            git commit -m "chore(catalog): update tags ($(date -u +'%Y-%m-%d'))"
            git push
          fi
