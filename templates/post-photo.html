<!doctype html>
<html lang="es-CL">
<head>
<meta charset="utf-8">
<title>Ruta Camp post (photo)</title>
<link rel="stylesheet" href="../brand/colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:transparent; }
  body { display:grid; place-items:center; }
  .ig-frame { width:1080px; height:1080px; position:relative; overflow:hidden; font-family:var(--font-body); color:var(--rc-cream); }
  .ig-eyebrow { font-family:var(--font-eyebrow); text-transform:uppercase; letter-spacing:.24em; font-weight:500; }
  .ig-title { font-family:var(--font-display); font-weight:800; line-height:1.0; letter-spacing:-.012em; font-style:italic; }
  .ig-body { font-family:var(--font-body); font-weight:400; line-height:1.4; }
  .ig-hand { font-family:var(--font-hand); font-weight:700; line-height:1; }
  .photo { position:absolute; inset:0; background-image:url("{{PHOTO_URL}}"); background-size:cover; background-position:{{PHOTO_POSITION}}; filter:saturate(1.05) contrast(1.02); }
  .photo::after { content:''; position:absolute; inset:0; background:linear-gradient(170deg, rgba(195,90,42,.05) 0%, rgba(30,28,24,0) 35%); }
  .protect-bottom { position:absolute; inset:0; background:linear-gradient(180deg, rgba(30,28,24,0) 35%, rgba(30,28,24,.78) 100%); pointer-events:none; }
  .protect-top { position:absolute; inset:0; background:linear-gradient(180deg, rgba(30,28,24,.55) 0%, rgba(30,28,24,0) 38%); pointer-events:none; }
  .topbar { position:absolute; top:60px; left:60px; right:60px; display:flex; justify-content:space-between; align-items:center; z-index:3; }
  .topbar img { height:90px; filter:brightness(0) invert(1); }
  .topbar .eyebrow { font-size:22px; color:var(--rc-amber); }
  .content { position:absolute; left:60px; right:60px; bottom:80px; z-index:3; }
  .content h1 { font-size:{{TITLE_SIZE}}px; margin:0; color:var(--rc-cream); }
  .eyebrow-row { display:flex; align-items:center; gap:20px; margin-top:24px; }
  .rule { width:60px; height:1px; background:var(--rc-amber); }
  .sub { font-size:22px; color:var(--rc-amber); }
  .content p { font-size:30px; margin-top:28px; max-width:760px; color:rgba(243,236,221,.92); }
  .tag { position:absolute; left:60px; bottom:60px; z-index:3; font-family:var(--font-hand); font-size:44px; color:var(--rc-amber); }
  .footer { position:absolute; right:60px; bottom:60px; z-index:3; }
  .footer .handle { font-size:18px; color:var(--rc-cream); opacity:.8; }
</style>
</head>
<body>
<div class="ig-frame" id="frame">
  <div class="photo"></div>
  <div class="protect-top"></div>
  <div class="protect-bottom"></div>
  <div class="topbar">
    <img src="../brand/assets/logo-light.png" alt="Ruta Camp">
    <span class="ig-eyebrow eyebrow">{{EYEBROW}}</span>
  </div>
  <div class="content">
    <h1 class="ig-title">{{TITLE}}</h1>
    <div class="eyebrow-row">
      <div class="rule"></div>
      <span class="ig-eyebrow sub">{{SUBTITLE}}</span>
    </div>
    <p class="ig-body">{{BODY}}</p>
  </div>
  <span class="ig-hand tag">{{HAND}}</span>
  <div class="footer"><span class="ig-eyebrow handle">{{HANDLE}}</span></div>
</div>
</body>
</html>
