<!doctype html>
<html lang="es-CL">
<head>
<meta charset="utf-8">
<title>Ruta Camp story (photo)</title>
<link rel="stylesheet" href="../brand/colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:transparent; }
  body { display:grid; place-items:center; }
  .ig-frame { width:1080px; height:1920px; position:relative; overflow:hidden; font-family:var(--font-body); color:var(--rc-cream); }
  .ig-eyebrow { font-family:var(--font-eyebrow); text-transform:uppercase; letter-spacing:.24em; font-weight:500; }
  .ig-title { font-family:var(--font-display); font-weight:800; line-height:1.0; letter-spacing:-.012em; font-style:italic; }
  .ig-body { font-family:var(--font-body); font-weight:400; line-height:1.4; }
  .ig-hand { font-family:var(--font-hand); font-weight:700; line-height:1; }

  .photo { position:absolute; inset:0; background-image:url("{{PHOTO_URL}}"); background-size:cover; background-position:{{PHOTO_POSITION}}; filter:saturate(1.05) contrast(1.02); }
  /* Three local scrims — surgical, NOT a full overlay. The bulk of the photo stays clean. */
  .protect-top { position:absolute; top:0; left:0; right:0; height:420px; pointer-events:none;
    background:linear-gradient(180deg, rgba(30,28,24,.72) 0%, rgba(30,28,24,.55) 50%, rgba(30,28,24,0) 100%); }
  .protect-bottom { position:absolute; bottom:0; left:0; right:0; height:520px; pointer-events:none;
    background:linear-gradient(180deg, rgba(30,28,24,0) 0%, rgba(30,28,24,.55) 35%, rgba(30,28,24,.92) 100%); }

  /* Safe frame: very tight margins so logo sits near the top edge and footer sits near the bottom edge.
     Mid block is anchored to the bottom THIRD (not center) so the photo dominates the upper 2/3. */
  .safe-frame {
    position:absolute;
    top:80px; left:90px; right:90px; bottom:80px;
    z-index:3;
  }

  .block-top { position:absolute; top:0; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:22px; text-align:center; }
  .block-top img { height:200px; filter:brightness(0) invert(1); }
  /* Eyebrow gets its own shadow so it reads against bright sky areas */
  .block-top .eyebrow { font-size:36px; color:var(--rc-amber); text-shadow:0 2px 10px rgba(30,28,24,.7), 0 1px 2px rgba(30,28,24,.6); }

  /* Mid copy block: anchored to bottom 220px (above block-bot). It grows UPWARD as content adds,
     but always stays within the lower third. Local horizontal scrim band only behind the copy. */
  .block-mid { position:absolute; left:-90px; right:-90px; bottom:220px; display:flex; flex-direction:column;
    padding:42px 90px;
    background:linear-gradient(180deg, rgba(30,28,24,0) 0%, rgba(30,28,24,.55) 14%, rgba(30,28,24,.55) 86%, rgba(30,28,24,0) 100%); }
  .block-mid h1 { font-size:{{TITLE_SIZE}}px; margin:0; color:var(--rc-cream); text-shadow:0 2px 8px rgba(30,28,24,.45); }
  .eyebrow-row { display:flex; align-items:center; gap:28px; margin-top:34px; }
  .eyebrow-row .rule { width:90px; height:2px; background:var(--rc-amber); }
  .eyebrow-row .sub { font-size:30px; color:var(--rc-amber); text-shadow:0 1px 6px rgba(30,28,24,.5); }
  .block-mid p { font-size:36px; line-height:1.35; margin:32px 0 0; max-width:900px; color:rgba(243,236,221,.94); text-shadow:0 1px 6px rgba(30,28,24,.5); }

  .block-bot { position:absolute; bottom:0; left:0; right:0; display:flex; flex-direction:column; gap:18px; }
  .block-bot .tag { font-family:var(--font-hand); font-size:78px; color:var(--rc-amber); line-height:.95; align-self:flex-start; }
  .block-bot .handle { font-size:26px; letter-spacing:.24em; color:var(--rc-cream); opacity:.85; padding-top:14px; border-top:1px solid rgba(243,236,221,.4); width:100%; text-align:right; }
</style>
</head>
<body>
<div class="ig-frame" id="frame">
  <div class="photo"></div>
  <div class="protect-top"></div>
  <div class="protect-bottom"></div>
  <div class="safe-frame">
    <header class="block-top">
      <img src="../brand/assets/logo-light.png" alt="Ruta Camp">
      <span class="ig-eyebrow eyebrow">{{EYEBROW}}</span>
    </header>
    <div class="block-mid">
      <h1 class="ig-title">{{TITLE}}</h1>
      {{SUBTITLE_BLOCK}}
      {{BODY_BLOCK}}
    </div>
    <footer class="block-bot">
      <span class="ig-hand tag">{{HAND}}</span>
      <span class="ig-eyebrow handle">{{HANDLE}}</span>
    </footer>
  </div>
</div>
</body>
</html>
