<!doctype html>
<html lang="es-CL">
<head>
<meta charset="utf-8">
<title>Ruta Camp story (cream)</title>
<link rel="stylesheet" href="../brand/colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:transparent; }
  body { display:grid; place-items:center; }
  .ig-frame { width:1080px; height:1920px; position:relative; overflow:hidden; background:var(--rc-cream); color:var(--rc-ink); font-family:var(--font-body); }
  .ig-eyebrow { font-family:var(--font-eyebrow); text-transform:uppercase; letter-spacing:.24em; font-weight:500; }
  .ig-title { font-family:var(--font-display); font-weight:800; line-height:1.0; letter-spacing:-.012em; font-style:italic; }
  .ig-body { font-family:var(--font-body); font-weight:400; line-height:1.4; }
  .ig-hand { font-family:var(--font-hand); font-weight:700; line-height:1; }

  .corner-rule { position:absolute; left:110px; right:110px; height:1px; background:var(--rc-ink); }
  .corner-rule.top { top:170px; }
  .corner-rule.bottom { bottom:170px; }

  /* Tight safe frame with absolute-positioned blocks inside. */
  .safe-frame {
    position:absolute;
    top:200px; left:110px; right:110px; bottom:200px;
    text-align:center;
    z-index:3;
  }

  .block-top { position:absolute; top:0; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:36px; }
  .block-top img { height:200px; }

  .block-mid { position:absolute; left:0; right:0; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; align-items:center; }
  .block-mid .eyebrow { font-size:36px; color:var(--rc-ember); }
  .block-mid h1 { font-size:{{TITLE_SIZE}}px; margin:38px 0 0; color:var(--rc-ink); }
  .block-mid .rule { margin:46px auto; width:140px; height:2px; background:var(--rc-ink); }
  .block-mid p { font-size:42px; line-height:1.4; max-width:840px; color:var(--rc-ink-soft); margin:0 auto; }

  .block-bot { position:absolute; bottom:0; left:0; right:0; display:flex; flex-direction:column; align-items:center; }
  .block-bot .hand { font-size:96px; color:var(--rc-ember); line-height:.95; }
</style>
</head>
<body>
<div class="ig-frame" id="frame">
  <div class="corner-rule top"></div>
  <div class="corner-rule bottom"></div>
  <div class="safe-frame">
    <div class="block-top">
      <img src="../brand/assets/logo-dark.png" alt="Ruta Camp">
    </div>
    <div class="block-mid">
      <span class="ig-eyebrow eyebrow">{{EYEBROW}}</span>
      <h1 class="ig-title">{{TITLE}}</h1>
      <div class="rule"></div>
      <p class="ig-body">{{BODY}}</p>
    </div>
    <div class="block-bot">
      <span class="ig-hand hand">{{HAND}}</span>
    </div>
  </div>
</div>
</body>
</html>
