<!doctype html>
<html lang="es-CL">
<head>
<meta charset="utf-8">
<title>Ruta Camp post (cream)</title>
<link rel="stylesheet" href="../brand/colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:transparent; }
  body { display:grid; place-items:center; }
  .ig-frame { width:1080px; height:1080px; position:relative; overflow:hidden; background:var(--rc-cream); color:var(--rc-ink); font-family:var(--font-body); }
  .ig-eyebrow { font-family:var(--font-eyebrow); text-transform:uppercase; letter-spacing:.24em; font-weight:500; }
  .ig-title { font-family:var(--font-display); font-weight:800; line-height:1.0; letter-spacing:-.012em; font-style:italic; }
  .ig-body { font-family:var(--font-body); font-weight:400; line-height:1.45; }
  .ig-hand { font-family:var(--font-hand); font-weight:700; line-height:1; }
  .corner-rule { position:absolute; left:60px; right:60px; height:1px; background:var(--rc-ink); }
  .corner-rule.top { top:60px; }
  .corner-rule.bottom { bottom:60px; }
  .inner { position:absolute; inset:110px 90px; display:flex; flex-direction:column; align-items:center; justify-content:space-between; text-align:center; }
  .logo { height:130px; }
  .eyebrow { font-size:24px; color:var(--rc-ember); }
  .inner h1 { font-size:{{TITLE_SIZE}}px; margin:28px 0 0; color:var(--rc-ink); }
  .rule { margin:32px auto; width:90px; height:1px; background:var(--rc-ink); }
  .inner p { font-size:30px; max-width:720px; color:var(--rc-ink-soft); margin:0 auto; }
  .hand { font-size:56px; color:var(--rc-ember); }
</style>
</head>
<body>
<div class="ig-frame" id="frame">
  <div class="corner-rule top"></div>
  <div class="corner-rule bottom"></div>
  <div class="inner">
    <img class="logo" src="../brand/assets/logo-dark.png" alt="Ruta Camp">
    <div>
      <span class="ig-eyebrow eyebrow">{{EYEBROW}}</span>
      <h1 class="ig-title">{{TITLE}}</h1>
      <div class="rule"></div>
      <p class="ig-body">{{BODY}}</p>
    </div>
    <span class="ig-hand hand">{{HAND}}</span>
  </div>
</div>
</body>
</html>
